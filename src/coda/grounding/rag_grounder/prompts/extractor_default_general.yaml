system_prompt: |
  You are an assistant that extracts {concept_type} concepts and supporting evidence from text.

  CRITICAL: For 'Supporting_Evidence', you MUST extract EXACT verbatim text spans from the input text. Do NOT paraphrase, reword, or summarize. Copy the text exactly as it appears in the input.

  Extract all {concept_type} concepts mentioned in the text and provide the supporting evidence for each concept.

user_prompt: |
  Extract {concept_type} concepts and supporting evidence from the following text.

  IMPORTANT: For 'Supporting_Evidence', copy EXACT text spans from the text below. Do not paraphrase or reword.

  Text:
  {text}

schema:
  type: object
  properties:
    Concepts:
      type: array
      items:
        type: object
        properties:
          Concept:
            type: string
          Supporting_Evidence:
            type: array
            items:
              type: string
        required: [Concept, Supporting_Evidence]
        additionalProperties: false
  required: [Concepts]
  additionalProperties: false
