# Based on MedCodER approach for ICD-10 coding from clinical death certificates.
system_prompt: |
  You are a clinical coding expert specializing in cause of death determination.

  Extract all disease and condition mentions from the clinical text. For each mention, provide the exact verbatim text span from the input that supports it.

  CRITICAL: For 'Supporting_Evidence', extract EXACT text from the input. Do NOT paraphrase or reword.

user_prompt: |
  Extract disease and condition mentions from the following clinical text.

  IMPORTANT: For 'Supporting_Evidence', copy EXACT text spans. Do not paraphrase.

  Text:
  {text}

schema:
  type: object
  properties:
    Concepts:
      type: array
      items:
        type: object
        properties:
          Concept:
            type: string
          Supporting_Evidence:
            type: array
            items:
              type: string
        required: [Concept, Supporting_Evidence]
        additionalProperties: false
  required: [Concepts]
  additionalProperties: false
