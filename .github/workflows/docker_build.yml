name: Build, test and push Docker images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # Satisfies OpenAIAdapter init for /health smoke test only (no openai API calls).
  OPENAI_API_KEY_SMOKE_TEST: sk-ci-dummy-key

jobs:
  # PR path: build per (image, platform) without pushing.
  # amd64 rows also run the smoke test (and Cypher verify for kg).
  # No Docker Hub credentials are used.
  test:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app
            dockerfile: Dockerfile.app
            image: gyorilab/coda.app
            build_args: COMPUTE_DEVICE=cpu
            platform: linux/amd64
            platform_pair: linux-amd64
            port: 8000
            health_retries: 60
            health_path: /health
            needs_openai_key: false
            lfs: false
            smoke_test: true
          - name: app
            dockerfile: Dockerfile.app
            image: gyorilab/coda.app
            build_args: COMPUTE_DEVICE=cpu
            platform: linux/arm64
            platform_pair: linux-arm64
            lfs: false
            smoke_test: false
          - name: inference
            dockerfile: Dockerfile.inference
            image: gyorilab/coda.inference
            platform: linux/amd64
            platform_pair: linux-amd64
            port: 5123
            health_retries: 30
            health_path: /health
            needs_openai_key: true
            lfs: false
            smoke_test: true
          - name: inference
            dockerfile: Dockerfile.inference
            image: gyorilab/coda.inference
            platform: linux/arm64
            platform_pair: linux-arm64
            lfs: false
            smoke_test: false
          - name: kg
            dockerfile: Dockerfile.kg
            image: gyorilab/coda.kg
            platform: linux/amd64
            platform_pair: linux-amd64
            port: 7474
            health_retries: 90
            health_path: /
            needs_openai_key: false
            lfs: true
            smoke_test: true

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: ${{ matrix.lfs }}

      - name: Set up QEMU
        if: matrix.platform != 'linux/amd64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          tags: ${{ matrix.image }}:test
          platforms: ${{ matrix.platform }}
          load: ${{ matrix.smoke_test }}
          push: false
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.name }}-${{ matrix.platform_pair }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}-${{ matrix.platform_pair }}

      - name: Smoke test container
        if: matrix.smoke_test
        run: |
          set -euo pipefail
          ENV_ARGS=()
          if [ "${{ matrix.needs_openai_key }}" = "true" ]; then
            ENV_ARGS=(-e "OPENAI_API_KEY=${OPENAI_API_KEY_SMOKE_TEST}")
          fi
          docker run -d --name coda-test \
            -p "${{ matrix.port }}:${{ matrix.port }}" \
            "${ENV_ARGS[@]}" \
            "${{ matrix.image }}:test"

          HEALTH_OK=false
          for i in $(seq 1 "${{ matrix.health_retries }}"); do
            if curl -sf "http://localhost:${{ matrix.port }}${{ matrix.health_path }}" > /dev/null; then
              echo "Health check passed on attempt ${i}"
              HEALTH_OK=true
              break
            fi
            echo "Waiting for health check (attempt ${i}/${{ matrix.health_retries }})..."
            sleep 2
          done

          if [ "${HEALTH_OK}" != "true" ]; then
            echo "Health check failed after ${{ matrix.health_retries }} attempts"
            docker logs coda-test
            exit 1
          fi

      - name: Verify KG contents via Cypher
        if: matrix.smoke_test && matrix.name == 'kg'
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{"statements":[{"statement":"MATCH (n) RETURN count(n) AS c"}]}' \
            "http://localhost:${{ matrix.port }}/db/neo4j/tx/commit")
          echo "Response: ${RESPONSE}"
          COUNT=$(echo "${RESPONSE}" | jq -r '.results[0].data[0].row[0]')
          echo "Node count: ${COUNT}"
          if [ -z "${COUNT}" ] || [ "${COUNT}" = "null" ] || [ "${COUNT}" -lt 1 ]; then
            echo "Expected node count > 0, got: ${COUNT}"
            docker logs coda-test
            exit 1
          fi
          echo "KG verification passed: ${COUNT} nodes"

      - name: Stop test container
        if: always() && matrix.smoke_test
        run: docker rm -f coda-test 2>/dev/null || true

  # Main path: pause for environment approval before any Docker Hub interaction.
  # This job does no work; its sole purpose is to gate downstream build/publish jobs.
  approve:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dockerhub-publish
    steps:
      - run: echo "Push to Docker Hub approved"

  # Main path: per-(image, platform) build, push by digest (no tag created here),
  # smoke test the image pulled by digest from Docker Hub.
  build:
    needs: approve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app
            dockerfile: Dockerfile.app
            image: gyorilab/coda.app
            build_args: COMPUTE_DEVICE=cpu
            platform: linux/amd64
            platform_pair: linux-amd64
            port: 8000
            health_retries: 60
            health_path: /health
            needs_openai_key: false
            lfs: false
            smoke_test: true
          - name: app
            dockerfile: Dockerfile.app
            image: gyorilab/coda.app
            build_args: COMPUTE_DEVICE=cpu
            platform: linux/arm64
            platform_pair: linux-arm64
            lfs: false
            smoke_test: false
          - name: inference
            dockerfile: Dockerfile.inference
            image: gyorilab/coda.inference
            platform: linux/amd64
            platform_pair: linux-amd64
            port: 5123
            health_retries: 30
            health_path: /health
            needs_openai_key: true
            lfs: false
            smoke_test: true
          - name: inference
            dockerfile: Dockerfile.inference
            image: gyorilab/coda.inference
            platform: linux/arm64
            platform_pair: linux-arm64
            lfs: false
            smoke_test: false
          - name: kg
            dockerfile: Dockerfile.kg
            image: gyorilab/coda.kg
            platform: linux/amd64
            platform_pair: linux-amd64
            port: 7474
            health_retries: 90
            health_path: /
            needs_openai_key: false
            lfs: true
            smoke_test: true

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: ${{ matrix.lfs }}

      - name: Set up QEMU
        if: matrix.platform != 'linux/amd64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build_push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.name }}-${{ matrix.platform_pair }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}-${{ matrix.platform_pair }}

      - name: Smoke test container (pulled by digest)
        if: matrix.smoke_test
        run: |
          set -euo pipefail
          IMAGE="${{ matrix.image }}@${{ steps.build_push.outputs.digest }}"
          docker pull "${IMAGE}"
          ENV_ARGS=()
          if [ "${{ matrix.needs_openai_key }}" = "true" ]; then
            ENV_ARGS=(-e "OPENAI_API_KEY=${OPENAI_API_KEY_SMOKE_TEST}")
          fi
          docker run -d --name coda-test \
            -p "${{ matrix.port }}:${{ matrix.port }}" \
            "${ENV_ARGS[@]}" \
            "${IMAGE}"

          HEALTH_OK=false
          for i in $(seq 1 "${{ matrix.health_retries }}"); do
            if curl -sf "http://localhost:${{ matrix.port }}${{ matrix.health_path }}" > /dev/null; then
              echo "Health check passed on attempt ${i}"
              HEALTH_OK=true
              break
            fi
            echo "Waiting for health check (attempt ${i}/${{ matrix.health_retries }})..."
            sleep 2
          done

          if [ "${HEALTH_OK}" != "true" ]; then
            echo "Health check failed after ${{ matrix.health_retries }} attempts"
            docker logs coda-test
            exit 1
          fi

      - name: Verify KG contents via Cypher
        if: matrix.smoke_test && matrix.name == 'kg'
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{"statements":[{"statement":"MATCH (n) RETURN count(n) AS c"}]}' \
            "http://localhost:${{ matrix.port }}/db/neo4j/tx/commit")
          echo "Response: ${RESPONSE}"
          COUNT=$(echo "${RESPONSE}" | jq -r '.results[0].data[0].row[0]')
          echo "Node count: ${COUNT}"
          if [ -z "${COUNT}" ] || [ "${COUNT}" = "null" ] || [ "${COUNT}" -lt 1 ]; then
            echo "Expected node count > 0, got: ${COUNT}"
            docker logs coda-test
            exit 1
          fi
          echo "KG verification passed: ${COUNT} nodes"

      - name: Stop test container
        if: always() && matrix.smoke_test
        run: docker rm -f coda-test 2>/dev/null || true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build_push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.name }}-${{ matrix.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Main path: per-image, assemble the multi-arch manifest list and tag :latest.
  # imagetools create only writes manifests, no blob uploads.
  publish:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app
            image: gyorilab/coda.app
          - name: inference
            image: gyorilab/coda.inference
          - name: kg
            image: gyorilab/coda.kg

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.name }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          cd /tmp/digests
          docker buildx imagetools create \
            -t ${{ matrix.image }}:latest \
            $(printf '${{ matrix.image }}@sha256:%s ' *)

      - name: Inspect manifest
        run: docker buildx imagetools inspect ${{ matrix.image }}:latest
