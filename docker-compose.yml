services:
  kg:
    image: gyorilab/coda.kg:latest
    build:
      context: .
      dockerfile: Dockerfile.kg
    ports:
      - "7474:7474"  # Neo4j Browser
      - "7687:7687"  # Neo4j Bolt
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5

  inference:
    image: gyorilab/coda.inference:latest
    build:
      context: .
      dockerfile: Dockerfile.inference
    ports:
      - "5123:5123"
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5123/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    image: gyorilab/coda.app:latest
    build:
      context: .
      dockerfile: Dockerfile.app
      # CPU-only build (default). For a GPU host, build with
      # COMPUTE_DEVICE=cuda, run with the NVIDIA container runtime, and add a
      # `deploy.resources.reservations.devices` GPU reservation here.
      args:
        COMPUTE_DEVICE: cpu
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - CODA_INFERENCE_URL=http://inference:5123
      - CODA_KG_URL=bolt://kg:7687
    depends_on:
      inference:
        condition: service_healthy
